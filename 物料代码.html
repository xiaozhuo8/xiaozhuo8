<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物料代码生成器 · 网页版</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(165deg, #dbe4ee 0%, #f0f4fa 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            box-shadow: 0 30px 45px -15px #1f3a5f;
            width: 100%;
            max-width: 1000px;
            padding: 32px 32px 40px;
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #0a273d;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .badge {
            background: #214c6e;
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
        }
        .sub {
            color: #2b577a;
            margin: 0 0 25px 0;
            border-left: 4px solid #467a9e;
            padding-left: 20px;
            font-size: 1.1rem;
            background: #eef4fa7e;
            border-radius: 0 30px 30px 0;
            line-height: 1.6;
        }
        /* 规则卡片 */
        .rule-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 28px;
            background: #ffffffd6;
            border-radius: 48px;
            padding: 16px 28px;
            margin-bottom: 28px;
            border: 1px solid white;
            font-weight: 500;
            box-shadow: 0 4px 12px #c7d8e9;
        }
        .rule-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .type-dot {
            width: 40px;
            height: 40px;
            background: #1f3f5c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 4px 6px #0000001a;
        }
        .type-label {
            color: #1b3b57;
            font-size: 1rem;
        }
        .type-label small {
            color: #6a859e;
            margin-left: 4px;
        }
        /* 控制区域 */
        .action-panel {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            margin: 30px 0 20px;
        }
        .select-wrap {
            flex: 2 1 260px;
        }
        .select-wrap label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f4a6e;
            margin-left: 14px;
            letter-spacing: 0.3px;
        }
        select {
            width: 100%;
            padding: 16px 28px;
            font-size: 1.1rem;
            border: 2px solid #d0e2f2;
            border-radius: 60px;
            background: white;
            box-shadow: inset 0 1px 5px #0000000c, 0 6px 14px #b4cbdf;
            font-weight: 500;
            color: #0a3149;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%23365f84" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 22px center;
            cursor: pointer;
        }
        .gen-btn {
            flex: 1 0 170px;
            background: #23547b;
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 12px 18px -6px #1b405b;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #6c9bc2;
        }
        .gen-btn:hover {
            background: #143e5e;
            transform: scale(1.02);
        }
        .gen-btn:active { transform: scale(0.98); }
        /* 预览卡片 */
        .preview-box {
            background: #e3effa;
            border-radius: 48px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px 30px;
            margin: 20px 0 32px;
            border: 1px solid white;
            box-shadow: 0 8px 16px #b7d0e5;
        }
        .preview-label {
            color: #1a4a72;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .preview-code {
            background: #0b2b41;
            color: white;
            padding: 12px 45px;
            border-radius: 60px;
            font-family: 'Courier New', monospace;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 5px;
            box-shadow: inset 0 -4px 0 #315d83;
        }
        /* 最新代码区域标题 + 查看历史 */
        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 12px;
        }
        .recent-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #113753;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pill-count {
            background: #2d6083;
            color: white;
            border-radius: 40px;
            padding: 4px 18px;
            font-size: 1rem;
        }
        .view-history-btn {
            background: #598bb0;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 5px 12px #7b9fc1;
            border: 1px solid #b3d0ea;
        }
        .view-history-btn:hover { background: #3f6f94; }
        /* 主显示区域（最近3条） */
        .main-display {
            background: #ffffffdd;
            border-radius: 32px;
            padding: 22px 26px;
            border: 1px solid white;
            box-shadow: inset 0 1px 5px #0000000a, 0 8px 22px #c1d4e6;
            margin-bottom: 16px;
        }
        .code-list {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            min-height: 85px;
        }
        /* 代码片公共样式 */
        .code-chip {
            background: white;
            border: 1px solid #c7ddf2;
            padding: 10px 30px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a3d5e;
            box-shadow: 0 3px 10px #b3cde0;
            transition: 0.1s;
        }
        .code-chip-new {
            background: #c3f0c3;
            border: 2px solid #1f8a4b;
            color: #054e1e;
            box-shadow: 0 3px 15px #9fdf9f;
            font-weight: 600;
        }
        .code-chip-new:before {
            content: "✨";
            font-size: 1rem;
            margin-right: 8px;
        }
        .code-chip:before {
            content: "🔹";
            font-size: 0.9rem;
            margin-right: 8px;
            opacity: 0.7;
        }
        /* 历史区域 (可隐藏) */
        .history-section {
            background: #edf5fc;
            border-radius: 32px;
            padding: 22px 26px;
            border: 2px dashed #87a9c9;
            margin-top: 18px;
            max-height: 280px;
            overflow-y: auto;
        }
        .history-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .history-head h4 {
            margin: 0;
            color: #17466b;
            font-size: 1.2rem;
        }
        .close-btn {
            background: #b7d2ea;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            color: #133a58;
            cursor: pointer;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .empty-msg {
            color: #7c95af;
            font-style: italic;
            padding: 20px 0 20px 30px;
            background: #e3effa;
            border-radius: 50px;
            width: 100%;
            text-align: center;
        }
        /* 管理按钮组 */
        .admin-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin: 20px 0 10px;
        }
        .admin-btn {
            background: #ecf3fa;
            border: 2px solid #b4ceea;
            border-radius: 40px;
            padding: 12px 30px;
            font-weight: 600;
            color: #174267;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 3px 8px #c5d8eb;
        }
        .admin-btn:hover { background: #dae8f5; }
        /* 密码浮层 */
        .password-overlay {
            background: #f5faff;
            border-radius: 60px;
            padding: 12px 20px 12px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 2px solid #b7d1ec;
            margin-top: 12px;
        }
        .password-overlay input {
            border: none;
            background: transparent;
            padding: 14px 5px;
            font-size: 1.1rem;
            flex: 1 1 200px;
            outline: none;
            color: #002856;
            font-family: monospace;
        }
        .password-overlay input::placeholder { color: #95adc7; }
        .pwd-btn {
            background: #2f618b;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .pwd-btn-cancel { background: #c2d5ec; color: #1d4465; }
        .warning { color: #c44545; margin-left: 12px; }
        .hidden { display: none !important; }
        .footer {
            margin-top: 32px;
            color: #3f6d92;
            font-size: 0.9rem;
            text-align: center;
            border-top: 1px dashed #b4ceea;
            padding-top: 22px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📦 物料代码·联机版 <span class="badge">8位不重复</span></h1>
    <div class="sub">管理操作需密码 · 新码绿色高亮 · 最近3条常驻</div>

    <!-- 规则速览 -->
    <div class="rule-flex">
        <div class="rule-item"><span class="type-dot">1</span><span class="type-label">原材料 <small>raw</small></span></div>
        <div class="rule-item"><span class="type-dot">2</span><span class="type-label">半成品 <small>semi</small></span></div>
        <div class="rule-item"><span class="type-dot">3</span><span class="type-label">成品 <small>final</small></span></div>
        <div class="rule-item"><span class="type-dot">4</span><span class="type-label">辅材 <small>aux</small></span></div>
        <div class="rule-item"><span class="type-dot">5</span><span class="type-label">工具/工装 <small>tool</small></span></div>
    </div>

    <!-- 选择 + 生成 -->
    <div class="action-panel">
        <div class="select-wrap">
            <label>📌 物料类型</label>
            <select id="typeSelect">
                <option value="1">1 · 原材料</option>
                <option value="2">2 · 半成品</option>
                <option value="3">3 · 成品</option>
                <option value="4">4 · 辅材</option>
                <option value="5">5 · 工具/工装</option>
            </select>
        </div>
        <button class="gen-btn" id="generateBtn">✨ 生成新代码</button>
    </div>

    <!-- 预览下一个 -->
    <div class="preview-box">
        <span class="preview-label">⏩ 下一代码</span>
        <span class="preview-code" id="nextCodePreview">10000000</span>
    </div>

    <!-- 最新3条区域 + 查看历史按钮 -->
    <div class="recent-header">
        <h3>📋 最新物料 <span class="pill-count" id="recentCount">0/0</span></h3>
        <button class="view-history-btn" id="viewHistoryBtn">📜 查看全部历史</button>
    </div>
    <div class="main-display">
        <div class="code-list" id="recentList">
            <div class="empty-msg">暂无代码，请生成</div>
        </div>
    </div>

    <!-- 历史记录抽屉 (默认隐藏) -->
    <div id="historySection" class="history-section hidden">
        <div class="history-head">
            <h4>📚 全部历史记录</h4>
            <button class="close-btn" id="closeHistoryBtn">✕ 关闭</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <!-- 管理操作按钮 (清除/重置) -->
    <div class="admin-buttons">
        <button class="admin-btn" id="clearBtn">🗑️ 清除记录</button>
        <button class="admin-btn" id="resetBtn">⟲ 重置全部</button>
    </div>

    <!-- 密码验证层 (隐藏) -->
    <div id="passwordOverlay" class="password-overlay hidden">
        <span style="color:#1a4870;">🔐 密码：</span>
        <input type="password" id="passwordInput" placeholder="输入管理密码" autocomplete="off">
        <button class="pwd-btn" id="confirmPwd">验证</button>
        <button class="pwd-btn pwd-btn-cancel" id="cancelPwd">取消</button>
        <span id="pwdError" class="warning hidden">密码错误</span>
    </div>

    <div class="footer">
        ⚙️ 首字母(1-5)+7位流水 · 从0000000递增 · 数据自动同步 (localStorage)
    </div>
</div>

<script>
(function() {
    // ---------- 密码 ----------
    const ADMIN_PASSWORD = "YLAS@2026";

    // ---------- 数据 ----------
    let allCodes = [];                 // 全部已生成代码, 例如 ["10000000","20000001"]
    let lastGenerated = null;           // 最后生成的代码，用于绿色高亮

    // 索引 (类型 -> 流水号Set)
    const typeIndex = new Map([
        ['1', new Set()],
        ['2', new Set()],
        ['3', new Set()],
        ['4', new Set()],
        ['5', new Set()]
    ]);

    // 当前选中类型
    let currentType = '1';

    // UI 元素
    const typeSelect = document.getElementById('typeSelect');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resetBtn = document.getElementById('resetBtn');
    const viewHistoryBtn = document.getElementById('viewHistoryBtn');
    const closeHistoryBtn = document.getElementById('closeHistoryBtn');
    const nextPreview = document.getElementById('nextCodePreview');
    const recentList = document.getElementById('recentList');
    const historyList = document.getElementById('historyList');
    const historySection = document.getElementById('historySection');
    const recentCount = document.getElementById('recentCount');
    // 密码
    const pwdOverlay = document.getElementById('passwordOverlay');
    const pwdInput = document.getElementById('passwordInput');
    const confirmPwd = document.getElementById('confirmPwd');
    const cancelPwd = document.getElementById('cancelPwd');
    const pwdError = document.getElementById('pwdError');

    let pendingAction = null; // 'clear' 或 'reset'

    // ---------- 工具函数 ----------
    const formatSerial = (num) => num.toString().padStart(7, '0');
    const makeCode = (type, serial) => type + formatSerial(serial);

    // 从 allCodes 重建索引
    function rebuildIndex() {
        typeIndex.forEach(s => s.clear());
        allCodes.forEach(code => {
            if (code?.length === 8) {
                const t = code[0];
                const serial = parseInt(code.slice(1), 10);
                if (typeIndex.has(t) && !isNaN(serial)) {
                    typeIndex.get(t).add(serial);
                }
            }
        });
    }

    // 从 localStorage 加载
    function loadFromStorage() {
        const stored = localStorage.getItem('material_codes');
        if (stored) {
            try { allCodes = JSON.parse(stored) || []; } 
            catch { allCodes = []; }
        } else {
            allCodes = [];
        }
        allCodes = allCodes.filter(c => typeof c === 'string' && c.length === 8);
        rebuildIndex();
    }

    // 保存到 localStorage
    function saveToStorage() {
        localStorage.setItem('material_codes', JSON.stringify(allCodes));
    }

    // 获取某类型下一个可用流水号
    function nextSerialForType(type) {
        const set = typeIndex.get(type);
        if (!set) return 0;
        let n = 0;
        while (set.has(n)) n++;
        return n;
    }

    // 刷新整个界面
    function refreshUI() {
        // 预览
        const next = nextSerialForType(currentType);
        nextPreview.textContent = makeCode(currentType, next);

        // 最近3条
        const recent = allCodes.slice(-3);
        if (allCodes.length === 0) {
            recentList.innerHTML = '<div class="empty-msg">暂无代码，请生成</div>';
        } else {
            let html = '';
            recent.forEach(code => {
                const isNew = (code === lastGenerated);
                const cls = isNew ? 'code-chip code-chip-new' : 'code-chip';
                html += `<span class="${cls}">${code}</span>`;
            });
            recentList.innerHTML = html;
        }

        // 全部历史 (用于抽屉)
        if (allCodes.length === 0) {
            historyList.innerHTML = '<div class="empty-msg">暂无历史记录</div>';
        } else {
            let histHtml = '';
            allCodes.forEach(code => {
                histHtml += `<span class="code-chip">${code}</span>`;
            });
            historyList.innerHTML = histHtml;
        }

        // 更新计数
        recentCount.textContent = `${Math.min(3, allCodes.length)}/${allCodes.length}`;
    }

    // 生成新代码
    function generateCode() {
        const set = typeIndex.get(currentType);
        if (!set) return;

        const nextSerial = nextSerialForType(currentType);
        if (nextSerial > 9999999) {
            alert(`⚠️ 类型 ${currentType} 流水号已达上限`);
            return;
        }

        const newCode = makeCode(currentType, nextSerial);
        set.add(nextSerial);
        allCodes.push(newCode);
        lastGenerated = newCode;   // 标记绿色
        saveToStorage();
        refreshUI();

        // 如果历史区域打开，保持打开，内容已更新
    }

    // 清除记录 (清空所有)
    function doClear() {
        typeIndex.forEach(s => s.clear());
        allCodes = [];
        lastGenerated = null;
        saveToStorage();
        refreshUI();
        historySection.classList.add('hidden'); // 关闭历史抽屉
    }

    // 重置全部 (清空 + 类型归1)
    function doReset() {
        typeIndex.forEach(s => s.clear());
        allCodes = [];
        currentType = '1';
        typeSelect.value = '1';
        lastGenerated = null;
        saveToStorage();
        refreshUI();
        historySection.classList.add('hidden');
    }

    // 弹出密码框
    function requestPassword(action) {
        pendingAction = action;
        pwdOverlay.classList.remove('hidden');
        pwdInput.value = '';
        pwdError.classList.add('hidden');
        pwdInput.focus();
    }

    function hidePassword() {
        pwdOverlay.classList.add('hidden');
        pendingAction = null;
    }

    function verifyPassword() {
        if (pwdInput.value.trim() === ADMIN_PASSWORD) {
            if (pendingAction === 'clear') doClear();
            else if (pendingAction === 'reset') doReset();
            hidePassword();
        } else {
            pwdError.classList.remove('hidden');
            pwdInput.value = '';
            pwdInput.focus();
        }
    }

    // ---------- 事件监听 ----------
    typeSelect.addEventListener('change', (e) => {
        currentType = e.target.value;
        refreshUI();
    });

    generateBtn.addEventListener('click', generateCode);

    clearBtn.addEventListener('click', () => requestPassword('clear'));
    resetBtn.addEventListener('click', () => requestPassword('reset'));

    // 查看历史 (无密码)
    viewHistoryBtn.addEventListener('click', () => {
        historySection.classList.remove('hidden');
    });
    closeHistoryBtn.addEventListener('click', () => {
        historySection.classList.add('hidden');
    });

    // 密码相关
    confirmPwd.addEventListener('click', verifyPassword);
    cancelPwd.addEventListener('click', hidePassword);
    pwdInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); verifyPassword(); }
    });

    // 跨标签页同步
    window.addEventListener('storage', (e) => {
        if (e.key === 'material_codes') {
            loadFromStorage();
            refreshUI();
        }
    });

    // 初始化
    loadFromStorage();
    refreshUI();
})();
</script>
</body>
</html>
